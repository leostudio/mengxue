<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>萌学 - 快乐学习</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 主页 - 功能选择 -->
    <div id="home-screen" class="screen active">
        <header class="app-header">
            <h1 class="app-title">🌟 萌学乐园 🌟</h1>
            <p class="app-subtitle">选择你想学习的内容吧！</p>
        </header>
        <div class="home-grid">
            <div id="btn-vision" class="home-card vision-card">
                <div class="home-icon">👁️</div>
                <div class="home-title">萌学视力表</div>
                <div class="home-desc">学习上下左右</div>
            </div>
            <div id="btn-alphabet" class="home-card alphabet-card">
                <div class="home-icon">🔤</div>
                <div class="home-title">萌学字母</div>
                <div class="home-desc">学习26个字母</div>
            </div>
            <div id="btn-hanzi" class="home-card hanzi-card">
                <div class="home-icon">🀄</div>
                <div class="home-title">萌学汉字</div>
                <div class="home-desc">学习常用汉字</div>
            </div>
        </div>
    </div>

    <!-- 字母网格页面 -->
    <div id="grid-screen" class="screen">
        <header class="detail-header">
            <button id="grid-back-btn" class="back-btn">← 返回</button>
            <h1 class="page-title">🌟 萌学字母 🌟</h1>
        </header>
        <div id="alphabet-grid" class="alphabet-grid"></div>
    </div>

    <!-- 详情页面 - 字母学习 -->
    <div id="detail-screen" class="screen">
        <header class="detail-header">
            <button id="back-btn" class="back-btn">← 返回</button>
        </header>
        <div class="letter-display">
            <div id="big-letter" class="big-letter">A</div>
        </div>
        <div class="controls">
            <button id="audio-btn" class="audio-btn">
                <span class="audio-icon">🔊</span>
                <span class="audio-text">听发音</span>
            </button>
            <button id="trace-btn" class="trace-btn">
                <span class="trace-icon">✏️</span>
                <span class="trace-text">开始描红</span>
            </button>
            <button id="book-btn" class="book-btn">
                <span class="book-icon">📖</span>
                <span class="book-text">字母小绘本</span>
            </button>
        </div>
    </div>

    <!-- 描红页面 - 全屏 -->
    <div id="trace-screen" class="screen">
        <div class="trace-header">
            <button id="trace-back-btn" class="trace-back-btn">← 退出</button>
            <div class="trace-progress">
                <span id="stroke-indicator" class="stroke-indicator">第 1 笔</span>
            </div>
            <button id="trace-complete-btn" class="trace-complete-btn hidden">✓ 完成</button>
        </div>
        <div class="trace-canvas-container">
            <canvas id="trace-guide-canvas" class="trace-canvas guide"></canvas>
            <canvas id="trace-draw-canvas" class="trace-canvas draw"></canvas>
            <div id="trace-hint" class="trace-hint">↓ 按照箭头方向描红 ↓</div>
            <div id="trace-try-again" class="trace-try-again">再试一次！</div>
            <div id="trace-start-hint" class="trace-start-hint">从粉色圆点开始哦</div>
        </div>
        <div class="trace-controls">
            <button id="trace-replay-btn" class="trace-control-btn">
                <span>🔄</span> 看演示
            </button>
            <button id="trace-clear-btn" class="trace-control-btn">
                <span id="trace-clear-icon">🗑️</span> <span id="trace-clear-text">重写</span>
            </button>
        </div>
    </div>

    <!-- 字母小绘本页面 -->
    <div id="book-screen" class="screen">
        <div class="book-header">
            <button id="book-back-btn" class="book-back-btn">← 返回</button>
            <div class="book-title">
                <span id="book-letter" class="book-letter">A</span>
                <span class="book-title-text">的小绘本</span>
            </div>
        </div>

        <div class="book-content">
            <!-- 单词卡片区域 -->
            <div class="word-card">
                <div class="word-display">
                    <span id="word-text" class="word-text">apple</span>
                    <span id="word-chinese" class="word-chinese">苹果</span>
                </div>
                <button id="word-audio-btn" class="word-audio-btn">
                    <span class="word-audio-icon">🔊</span>
                    <span class="word-audio-text">听单词</span>
                </button>
            </div>

            <!-- 绘本画板区域 -->
            <div class="book-canvas-container">
                <canvas id="book-guide-canvas" class="book-canvas guide"></canvas>
                <canvas id="book-draw-canvas" class="book-canvas draw"></canvas>
                <div id="book-hint" class="book-hint">↓ 按照轮廓描绘图片 ↓</div>
            </div>

            <!-- 绘本控制区域 -->
            <div class="book-controls">
                <button id="book-replay-btn" class="book-control-btn">
                    <span>🎬</span> 看动画
                </button>
                <button id="book-clear-btn" class="book-control-btn">
                    <span>🗑️</span> 重画
                </button>
                <button id="book-complete-btn" class="book-control-btn complete hidden">
                    <span>⭐</span> 完成啦
                </button>
            </div>
        </div>
    </div>

    <!-- 视力表主页 -->
    <div id="vision-screen" class="screen">
        <div class="vision-header">
            <button id="vision-back-btn" class="vision-back-btn">← 返回</button>
            <div class="vision-title">👁️ 萌学视力表</div>
            <div class="vision-header-spacer"></div>
        </div>
        <div class="vision-intro">
            <p class="vision-intro-text">点击卡片，学习 E 字的方向吧！</p>
        </div>
        <div class="vision-e-grid" id="vision-e-grid"></div>
    </div>

    <!-- 视力表方向详情页 -->
    <div id="vision-detail-screen" class="screen">
        <div class="vision-detail-header">
            <button id="vision-detail-back-btn" class="vision-back-btn">← 返回</button>
            <div id="vision-detail-title" class="vision-detail-title">向上 ↑</div>
            <div class="vision-header-spacer"></div>
        </div>
        <div class="vision-detail-main">
            <div class="vision-left">
                <div class="vision-detail-hint-text" id="vision-hint-text">开口朝上就是上</div>
                <div class="vision-detail-e-wrapper">
                    <div class="vision-detail-e" id="vision-detail-e">E</div>
                    <div class="vision-detail-arrow" id="vision-detail-arrow">↑</div>
                </div>
            </div>
            <div class="vision-trace-area" id="vision-trace-area">
                <canvas id="vision-trace-guide" class="vision-trace-canvas"></canvas>
                <canvas id="vision-trace-draw" class="vision-trace-canvas"></canvas>
                <div id="vision-trace-hint" class="vision-trace-hint">从粉色圆点开始划</div>
                <div id="vision-trace-retry" class="vision-trace-retry">再试一次！</div>
            </div>
        </div>
        <div class="vision-detail-controls">
            <button id="vision-speak-btn" class="vision-detail-btn speak-btn">
                <span>🔊</span> 听发音
            </button>
            <button id="vision-next-btn" class="vision-detail-btn next-btn">
                <span>➡️</span> 下一个
            </button>
            <button id="vision-home-btn" class="vision-detail-btn home-btn">
                <span>🏠</span> 返回
            </button>
        </div>
    </div>

    <!-- 萌学汉字 - 汉字列表页 -->
    <div id="hanzi-grid-screen" class="screen">
        <header class="hanzi-grid-header">
            <button id="hanzi-grid-back-btn" class="back-btn">← 返回</button>
            <h1 class="page-title">🀄 萌学汉字 🀄</h1>
        </header>
        <div class="hanzi-search-bar">
            <input type="text" id="hanzi-search-input" class="hanzi-search-input" placeholder="🔍 搜索汉字或拼音...">
        </div>
        <div class="hanzi-level-tabs">
            <button class="hanzi-tab active" data-level="all">全部</button>
            <button class="hanzi-tab" data-level="1">⭐ 初级</button>
            <button class="hanzi-tab" data-level="2">⭐⭐ 中级</button>
            <button class="hanzi-tab" data-level="3">⭐⭐⭐ 高级</button>
        </div>
        <div id="hanzi-grid" class="hanzi-grid"></div>
    </div>

    <!-- 萌学汉字 - 汉字详情页 -->
    <div id="hanzi-detail-screen" class="screen">
        <header class="detail-header">
            <button id="hanzi-detail-back-btn" class="back-btn">← 返回</button>
        </header>
        <div class="hanzi-display">
            <div id="hanzi-pinyin" class="hanzi-pinyin">pīn yīn</div>
            <div id="hanzi-big-char" class="hanzi-big-char">字</div>
        </div>
        <div class="hanzi-detail-controls">
            <button id="hanzi-audio-btn" class="hanzi-audio-btn">
                <span class="audio-icon">🔊</span>
                <span class="audio-text">听发音</span>
            </button>
            <button id="hanzi-trace-btn" class="hanzi-trace-btn">
                <span class="trace-icon">✏️</span>
                <span class="trace-text">开始描红</span>
            </button>
        </div>
        <div class="hanzi-words-section">
            <div class="hanzi-words-title">📝 相关词语</div>
            <div id="hanzi-words-list" class="hanzi-words-list"></div>
            <div class="hanzi-words-hint">← 左右滑动查看更多 →</div>
        </div>
    </div>

    <!-- 萌学汉字 - 描红页 -->
    <div id="hanzi-trace-screen" class="screen">
        <div class="hanzi-trace-header">
            <button id="hanzi-trace-back-btn" class="trace-back-btn">← 退出</button>
            <div class="hanzi-trace-progress">
                <span id="hanzi-stroke-indicator" class="stroke-indicator">第 1 笔</span>
            </div>
            <div class="hanzi-trace-spacer"></div>
        </div>
        <div class="hanzi-writer-container">
            <div id="hanzi-writer-target" class="hanzi-writer-target"></div>
        </div>
        <div class="hanzi-trace-controls">
            <button id="hanzi-animate-btn" class="trace-control-btn">
                <span>🎬</span> 看笔顺
            </button>
            <button id="hanzi-rewrite-btn" class="trace-control-btn">
                <span>🔄</span> 重写
            </button>
        </div>
    </div>

    <!-- 完成动画 -->
    <div id="celebration" class="celebration hidden">
        <div class="celebration-content">
            <div class="stars">⭐✨🌟✨⭐</div>
            <p class="celebration-text">太棒了！</p>
        </div>
    </div>

    <!-- 小红花庆祝动画 -->
    <div id="flower-celebration" class="flower-celebration hidden">
        <div class="celebration-content">
            <div class="flower-icon">🌺</div>
            <p class="flower-text">太棒了！送你一朵小红花！</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
